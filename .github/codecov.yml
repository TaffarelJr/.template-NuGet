# See https://docs.codecov.com/docs/codecovyml-reference

#───────────────────────────────────────────────────────────────────────────────
# General Codecov configuration
# https://docs.codecov.com/docs/codecovyml-reference#codecov
#───────────────────────────────────────────────────────────────────────────────

codecov:
  require_ci_to_pass: true # Only report if CI passes
  notify:
    wait_for_ci: true      # Wait for CI to finish before notifications
    notify_error: true     # Notify on errors

#───────────────────────────────────────────────────────────────────────────────
# Coverage reporting and status checks
# https://docs.codecov.com/docs/codecovyml-reference#coverage
#───────────────────────────────────────────────────────────────────────────────

coverage:
  precision: 2                # Number of decimal places in coverage
  round: down                 # Round coverage down
  range: '90...95'            # Coverage range for status colors
  status:

    # Overall coverage status for the entire project
    project:
      default:
        target: auto          # Target coverage is auto-calculated
        threshold: 1%         # Allow 1% drop before failing
        if_not_found: failure # Fail if no coverage found
        if_ci_failed: error   # Error if CI fails

    # Coverage status for only the lines changed in the PR (the patch)
    patch:
      default:
        target: 95%           # Require 95% coverage on new/changed code
        threshold: 2%         # Allow 2% drop on patch before failing
        if_ci_failed: error   # Error if CI fails

    # Per-change coverage status (each changed file or group of lines)
    changes: false

#───────────────────────────────────────────────────────────────────────────────
# Settings for managing Codecov flags (one per report)
# https://docs.codecov.com/docs/codecovyml-reference#flags
#───────────────────────────────────────────────────────────────────────────────

flag_management:
  default_rules:
    carryforward: true # Carry forward flags if not present in new upload

#───────────────────────────────────────────────────────────────────────────────
# Settings for managing Codecov components (one per project)
# https://docs.codecov.com/docs/codecovyml-reference#component_management
#───────────────────────────────────────────────────────────────────────────────

component_management:
  individual_components:
    - component_id: fake # Identifier that must never change
      name: Fake         # Display name that can be changed freely
      paths: [src/Fake/**]

#───────────────────────────────────────────────────────────────────────────────
# Pull request comment settings
# https://docs.codecov.com/docs/codecovyml-reference#comment
#───────────────────────────────────────────────────────────────────────────────

comment:
  layout: header,flags,condensed_header # ,reach,diff,components,condensed_files,files,footer,condensed_footer
  behavior: default            # Update the Codecov comment on the PR as coverage changes
  require_changes: false       # Comment even if no changes
  require_base: false          # Don't require base report for comment
  require_head: false          # Don't require head commit coverage for comment
  hide_project_coverage: false # Show whole-project coverage in comment
